<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TradeBot - WebSocket 实时推送测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            background: #0a0e27;
            color: #e0e6ed;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4757;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .status-text {
            font-size: 0.875rem;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            background: #1e293b;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ff88;
            color: #0a0e27;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .events-container {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .event-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .event-type {
            color: #00ff88;
            font-weight: 600;
        }

        .event-content {
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .event-data {
            margin-top: 8px;
            padding: 8px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .event-data label {
            color: #94a3b8;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI TradeBot - WebSocket 实时推送</h1>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalEvents">0</div>
                <div class="stat-label">总事件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="newEvents">0</div>
                <div class="stat-label">新事件</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="updates">0</div>
                <div class="stat-label">状态更新</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text" id="statusText">未连接</div>
            </div>
            <div class="controls">
                <button id="connectBtn" onclick="connect()">连接</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled>断开</button>
                <button id="clearBtn" onclick="clearEvents()">清空</button>
            </div>
        </div>

        <div class="events-container" id="eventsContainer">
            <div class="empty-state">
                等待事件...
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let stats = { total: 0, new: 0, updates: 0 };

        function connect() {
            const wsUrl = 'ws://localhost:8000/ws/events';

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    updateStatus(true);
                    addEvent('connected', { message: '已连接到实时推送服务' });
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleEvent(data);
                };

                ws.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                    updateStatus(false, '连接错误');
                };

                ws.onclose = () => {
                    updateStatus(false);
                };

            } catch (error) {
                console.error('连接失败:', error);
                updateStatus(false, '连接失败');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function updateStatus(connected, text = null) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');

            dot.classList.toggle('connected', connected);
            statusText.textContent = text || (connected ? '已连接' : '未连接');
            connectBtn.disabled = connected;
            disconnectBtn.disabled = !connected;
        }

        function handleEvent(data) {
            stats.total++;

            if (data.type === 'new_event') {
                stats.new++;
            } else if (data.type === 'status_change') {
                stats.updates++;
            }

            updateStats();
            addEvent(data.type, data.data);
        }

        function updateStats() {
            document.getElementById('totalEvents').textContent = stats.total;
            document.getElementById('newEvents').textContent = stats.new;
            document.getElementById('updates').textContent = stats.updates;
        }

        function addEvent(type, data) {
            const container = document.getElementById('eventsContainer');

            // 移除空状态
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const eventEl = document.createElement('div');
            eventEl.className = 'event-item';

            const timestamp = data.timestamp || new Date().toISOString();

            let typeLabel = type;
            if (type === 'new_event') typeLabel = '新事件';
            else if (type === 'status_change') typeLabel = '状态变更';
            else if (type === 'connected') typeLabel = '已连接';

            let contentHtml = '';

            if (type === 'new_event') {
                contentHtml = `
                    <div><strong>${data.ticker}</strong>: ${data.status}</div>
                    <div style="margin-top: 8px; color: #94a3b8;">${data.summary.substring(0, 100)}...</div>
                `;
            } else if (type === 'status_change') {
                contentHtml = `
                    <div>事件: ${data.event_id}</div>
                    <div>新状态: ${data.status}</div>
                `;
            } else if (type === 'connected') {
                contentHtml = `<div>${data.message}</div>`;
            }

            eventEl.innerHTML = `
                <div class="event-header">
                    <span class="event-type">${typeLabel}</span>
                    <span>${new Date(timestamp).toLocaleTimeString('zh-CN')}</span>
                </div>
                <div class="event-content">${contentHtml}</div>
            `;

            container.insertBefore(eventEl, container.firstChild);

            // 限制显示的事件数量
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        function clearEvents() {
            const container = document.getElementById('eventsContainer');
            container.innerHTML = '<div class="empty-state">等待事件...</div>';
            stats = { total: 0, new: 0, updates: 0 };
            updateStats();
        }

        // 自动连接
        window.onload = () => {
            connect();
        };

        // 页面关闭时断开连接
        window.onbeforeunload = () => {
            if (ws) {
                ws.close();
            }
        };
    </script>
</body>
</html>
