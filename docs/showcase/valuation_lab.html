<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TradeBot - 专业估值实验室</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #1a1a24;
            --neon-green: #00ff41;
            --neon-cyan: #00ffff;
            --neon-yellow: #ffff00;
            --neon-red: #ff0055;
            --neon-purple: #bf00ff;
            --neon-orange: #ff8800;
            --text-primary: #e0e0e0;
            --text-secondary: #808080;
            --text-muted: #404040;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 顶部标题 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-card);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            font-size: 28px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header-text h1 {
            font-size: 18px;
            color: var(--neon-green);
            letter-spacing: 3px;
        }

        .header-text p {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--neon-green);
            border-radius: 6px;
            color: var(--neon-green);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* 影响矩阵表格 */
        .impact-matrix-section {
            background: var(--bg-card);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(0, 255, 65, 0.1), rgba(0, 255, 255, 0.05));
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--neon-green);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-meta {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .matrix-table th {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 10px;
            text-align: left;
            color: var(--neon-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            position: sticky;
            top: 0;
        }

        .matrix-table td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
        }

        .matrix-table tr:hover {
            background: rgba(0, 255, 65, 0.05);
        }

        .news-content {
            color: var(--text-primary);
            line-height: 1.6;
            max-width: 250px;
        }

        .score-cell {
            text-align: center;
            font-weight: 700;
            font-size: 16px;
        }

        .score-high {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
            animation: scoreFlash 1s ease-in-out infinite;
        }

        @keyframes scoreFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .score-medium {
            color: var(--neon-orange);
        }

        .score-low {
            color: var(--neon-green);
        }

        .desc-cell {
            color: var(--text-secondary);
            font-size: 10px;
            line-height: 1.5;
        }

        .companies-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .company-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            font-size: 10px;
            color: var(--neon-cyan);
            cursor: pointer;
            transition: all 0.2s;
        }

        .company-tag:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* 估值报告区 */
        .valuation-report {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .report-card {
            background: var(--bg-card);
            border: 1px solid rgba(191, 0, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .report-card.full-width {
            grid-column: 1 / -1;
        }

        .report-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(191, 0, 255, 0.1), rgba(0, 255, 255, 0.05));
            border-bottom: 1px solid rgba(191, 0, 255, 0.2);
        }

        .report-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-purple);
            letter-spacing: 2px;
        }

        .report-body {
            padding: 20px;
        }

        /* 模型公示 */
        .model-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 255, 65, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            margin-bottom: 15px;
        }

        .model-icon {
            font-size: 24px;
        }

        .model-details {
            flex: 1;
        }

        .model-industry {
            font-size: 11px;
            color: var(--neon-cyan);
            margin-bottom: 5px;
        }

        .model-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--neon-green);
        }

        /* 三档估值 */
        .valuation-tier {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .tier-card {
            text-align: center;
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tier-card.bullish {
            border-color: var(--neon-green);
            background: rgba(0, 255, 65, 0.05);
        }

        .tier-card.neutral {
            border-color: var(--neon-yellow);
            background: rgba(255, 255, 0, 0.05);
        }

        .tier-card.bearish {
            border-color: var(--neon-red);
            background: rgba(255, 0, 85, 0.05);
        }

        .tier-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .tier-value {
            font-size: 28px;
            font-weight: 700;
        }

        .tier-card.bullish .tier-value { color: var(--neon-green); }
        .tier-card.neutral .tier-value { color: var(--neon-yellow); }
        .tier-card.bearish .tier-value { color: var(--neon-red); }

        .tier-change {
            font-size: 10px;
            margin-top: 8px;
        }

        /* 定价诊断 */
        .pricing-diagnosis {
            margin-top: 15px;
        }

        .diagnosis-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .diagnosis-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .diagnosis-value {
            font-size: 12px;
            font-weight: 600;
        }

        .diagnosis-value.positive { color: var(--neon-green); }
        .diagnosis-value.negative { color: var(--neon-red); }
        .diagnosis-value.neutral { color: var(--neon-yellow); }

        /* 结论输出 */
        .conclusion-box {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.1), rgba(0, 255, 255, 0.05));
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            margin-top: 15px;
        }

        .conclusion-icon {
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .conclusion-text {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--neon-green);
        }

        .conclusion-detail {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: loadingBounce 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .valuation-report {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .matrix-table {
                font-size: 9px;
            }

            .matrix-table th,
            .matrix-table td {
                padding: 8px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题 -->
        <header class="header">
            <div class="header-title">
                <span class="header-logo">🧠</span>
                <div class="header-text">
                    <h1>AI TRADEBOT 估值实验室</h1>
                    <p>基于行业对标的严谨建模</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn" id="btnAnalyze" onclick="startAnalysis()">
                    <span>📊</span>
                    <span>研读全球情报</span>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 新闻影响矩阵表 -->
            <section class="impact-matrix-section">
                <div class="section-header">
                    <span class="section-title">📊 新闻影响程度矩阵</span>
                    <span class="section-meta" id="matrixMeta">等待分析...</span>
                </div>
                <div id="matrixContainer">
                    <div class="empty-state">
                        <div class="empty-icon">📰</div>
                        <div>点击"研读全球情报"开始分析</div>
                    </div>
                </div>
            </section>

            <!-- 专业估值报告区 -->
            <section class="valuation-report" id="valuationReport" style="display: none;">
                <!-- 模型公示 -->
                <div class="report-card full-width">
                    <div class="report-header">
                        <span class="report-title">📐 估值模型</span>
                    </div>
                    <div class="report-body">
                        <div class="model-info" id="modelInfo">
                            <span class="model-icon">🏭</span>
                            <div class="model-details">
                                <div class="model-industry" id="modelIndustry">检测行业: --</div>
                                <div class="model-name" id="modelName">启用模型: --</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 三档估值 -->
                <div class="report-card">
                    <div class="report-header">
                        <span class="report-title">💰 三档估值</span>
                    </div>
                    <div class="report-body">
                        <div class="valuation-tier" id="valuationTier">
                            <div class="tier-card bearish">
                                <div class="tier-label">悲观</div>
                                <div class="tier-value" id="bearishValue">--</div>
                                <div class="tier-change" id="bearishChange">--</div>
                            </div>
                            <div class="tier-card neutral">
                                <div class="tier-label">中性</div>
                                <div class="tier-value" id="neutralValue">--</div>
                                <div class="tier-change" id="neutralChange">--</div>
                            </div>
                            <div class="tier-card bullish">
                                <div class="tier-label">乐观</div>
                                <div class="tier-value" id="bullishValue">--</div>
                                <div class="tier-change" id="bullishChange">--</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 定价诊断 -->
                <div class="report-card">
                    <div class="report-header">
                        <span class="report-title">🔍 定价诊断</span>
                    </div>
                    <div class="report-body">
                        <div class="pricing-diagnosis" id="pricingDiagnosis">
                            <div class="diagnosis-row">
                                <span class="diagnosis-label">当前市价</span>
                                <span class="diagnosis-value" id="currentPrice">--</span>
                            </div>
                            <div class="diagnosis-row">
                                <span class="diagnosis-label">估值均值</span>
                                <span class="diagnosis-value" id="avgValue">--</span>
                            </div>
                            <div class="diagnosis-row">
                                <span class="diagnosis-label">偏离度</span>
                                <span class="diagnosis-value" id="driftValue">--</span>
                            </div>
                        </div>

                        <div class="conclusion-box" id="conclusionBox">
                            <div class="conclusion-icon">⚖️</div>
                            <div class="conclusion-text" id="conclusionText">定价合理</div>
                            <div class="conclusion-detail" id="conclusionDetail">估值与市场价格基本一致</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api/v1';
        let currentValuation = null;

        // 开始分析
        async function startAnalysis() {
            const btn = document.getElementById('btnAnalyze');
            btn.disabled = true;

            // 显示加载状态
            document.getElementById('matrixContainer').innerHTML = `
                <div class="loading">
                    <div class="loading-dots">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                    <div>🧠 GLM-5 正在分析全球情报...</div>
                </div>
            `;
            document.getElementById('matrixMeta').textContent = '分析中...';

            try {
                // 1. 获取报纸分析
                const papersResp = await fetch(`${API_BASE}/papers/analyze`);
                const papersData = await papersResp.json();

                if (!papersData.success) {
                    throw new Error(papersData.error || '报纸分析失败');
                }

                const results = papersData.data.results || [];

                // 2. 调用影响矩阵 API
                const newsContent = results.map(r => `【${r.source}】${r.summary}`).join('\n');

                const matrixResp = await fetch(`${API_BASE}/impact-matrix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        news_content: newsContent,
                        source: 'newspaper'
                    })
                });

                const matrixData = await matrixResp.json();

                if (matrixData.success && matrixData.data.matrices.length > 0) {
                    displayMatrix(matrixData.data.matrices);

                    // 3. 选择第一条新闻进行估值分析
                    if (matrixData.data.matrices[0].related_companies?.length > 0) {
                        const company = matrixData.data.matrices[0].related_companies[0];
                        await performValuation(company, matrixData.data.matrices[0]);
                    }
                } else {
                    // 使用模拟数据
                    displayMockMatrix();
                    displayMockValuation();
                }

                document.getElementById('matrixMeta').textContent =
                    `${results.length} 份报纸 · ${matrixData.data?.matrices?.length || 0} 条影响矩阵`;

            } catch (error) {
                console.error('分析失败:', error);
                displayMockMatrix();
                displayMockValuation();
                document.getElementById('matrixMeta').textContent = '使用模拟数据';
            } finally {
                btn.disabled = false;
            }
        }

        // 显示影响矩阵
        function displayMatrix(matrices) {
            let html = `
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th style="width:20%">新闻内容</th>
                            <th style="width:8%">地缘评分</th>
                            <th style="width:12%">技术突破</th>
                            <th style="width:12%">国家政策</th>
                            <th style="width:12%">产业链发展</th>
                            <th style="width:14%">成本/价格变化</th>
                            <th style="width:12%">涉及公司</th>
                            <th style="width:10%">综合评分</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            matrices.forEach(m => {
                const geoClass = m.geopolitical_score >= 8 ? 'score-high' :
                                 m.geopolitical_score >= 6 ? 'score-medium' : 'score-low';
                const overallClass = m.overall_score >= 8 ? 'score-high' :
                                      m.overall_score >= 6 ? 'score-medium' : 'score-low';

                const companies = m.related_companies?.map(c =>
                    `<span class="company-tag" onclick="selectCompany('${c}')">${c}</span>`
                ).join('') || '<span style="color:var(--text-muted)">-</span>';

                html += `
                    <tr>
                        <td class="news-content">${m.news_summary || '-'}</td>
                        <td class="score-cell ${geoClass}">${m.geopolitical_score?.toFixed(1) || '-'}</td>
                        <td class="desc-cell">${m.tech_breakthrough || '-'}</td>
                        <td class="desc-cell">${m.policy_relevance || '-'}</td>
                        <td class="desc-cell">${m.supply_chain_impact || '-'}</td>
                        <td class="desc-cell">${m.cost_price_change || '-'}</td>
                        <td><div class="companies-cell">${companies}</div></td>
                        <td class="score-cell ${overallClass}">${m.overall_score?.toFixed(1) || '-'}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('matrixContainer').innerHTML = html;
        }

        // 显示模拟矩阵
        function displayMockMatrix() {
            const mockMatrices = [
                {
                    news_summary: "美联储暗示可能暂停加息，最新通胀数据降温，美元指数回落。",
                    geopolitical_score: 8.5,
                    tech_breakthrough: "无直接影响",
                    policy_relevance: "货币政策转向预期",
                    supply_chain_impact: "全球流动性改善",
                    cost_price_change: "美元走弱，大宗商品价格企稳",
                    related_companies: ["黄金ETF", "资源股"],
                    overall_score: 8.0
                },
                {
                    news_summary: "国内半导体产业政策支持力度加大，国产替代加速推进。",
                    geopolitical_score: 7.0,
                    tech_breakthrough: "28nm及以上成熟工艺国产化",
                    policy_relevance: "产业政策红利",
                    supply_chain_impact: "上游设备/材料受益",
                    cost_price_change: "国产设备成本优势显现",
                    related_companies: ["中芯国际", "北方华创"],
                    overall_score: 8.5
                }
            ];
            displayMatrix(mockMatrices);
        }

        // 执行估值分析
        async function performValuation(company, matrix) {
            document.getElementById('valuationReport').style.display = 'grid';

            // 显示加载
            document.getElementById('modelIndustry').textContent = '检测行业: 分析中...';
            document.getElementById('modelName').textContent = '启用模型: 计算中...';

            // 模拟估值计算
            await new Promise(r => setTimeout(r, 1500));

            // 根据新闻内容推断行业
            let industry = "传统制造/消费";
            let model = "P/E (市盈率)";

            if (matrix.tech_breakthrough && matrix.tech_breakthrough !== "无直接影响") {
                industry = "半导体/硬件";
                model = "P/E, PEG (市盈率相对盈利增长比)";
            } else if (matrix.policy_relevance?.includes("货币政策")) {
                industry = "银行/保险";
                model = "P/B (市净率), P/EV (内含价值)";
            } else if (matrix.supply_chain_impact?.includes("资源")) {
                industry = "资源/矿产";
                model = "P/NAV (市价/资产净值)";
            }

            // 生成模拟估值
            const basePrice = 100;
            const bullish = basePrice * (1 + 0.25);
            const neutral = basePrice * (1 + 0.02);
            const bearish = basePrice * (1 - 0.15);

            currentValuation = {
                company,
                industry,
                model,
                bullish,
                neutral,
                bearish,
                currentPrice: basePrice,
            };

            // 更新UI
            document.getElementById('modelIndustry').textContent = `检测行业: ${industry}`;
            document.getElementById('modelName').textContent = `启用模型: ${model}`;

            document.getElementById('bullishValue').textContent = bullish.toFixed(1);
            document.getElementById('neutralValue').textContent = neutral.toFixed(1);
            document.getElementById('bearishValue').textContent = bearish.toFixed(1);

            document.getElementById('bullishChange').textContent = '+25.0%';
            document.getElementById('neutralChange').textContent = '+2.0%';
            document.getElementById('bearishChange').textContent = '-15.0%';

            document.getElementById('currentPrice').textContent = basePrice.toFixed(1);

            const avgValue = (bullish + neutral + bearish) / 3;
            document.getElementById('avgValue').textContent = avgValue.toFixed(1);

            const drift = ((avgValue - basePrice) / basePrice * 100);
            const driftEl = document.getElementById('driftValue');
            driftEl.textContent = `${drift >= 0 ? '+' : ''}${drift.toFixed(1)}%`;
            driftEl.className = `diagnosis-value ${drift > 5 ? 'positive' : drift < -5 ? 'negative' : 'neutral'}`;

            // 结论
            const conclusionText = document.getElementById('conclusionText');
            const conclusionDetail = document.getElementById('conclusionDetail');
            const conclusionIcon = document.querySelector('.conclusion-icon');

            if (drift > 15) {
                conclusionIcon.textContent = '📉';
                conclusionText.textContent = '显著折价';
                conclusionText.style.color = 'var(--neon-green)';
                conclusionDetail.textContent = `估值均值高于市价 ${drift.toFixed(1)}%，存在上涨空间`;
            } else if (drift < -15) {
                conclusionIcon.textContent = '📈';
                conclusionText.textContent = '显著溢价';
                conclusionText.style.color = 'var(--neon-red)';
                conclusionDetail.textContent = `估值均值低于市价 ${Math.abs(drift).toFixed(1)}%，需谨慎`;
            } else {
                conclusionIcon.textContent = '⚖️';
                conclusionText.textContent = '定价合理';
                conclusionText.style.color = 'var(--neon-yellow)';
                conclusionDetail.textContent = '估值与市场价格基本一致';
            }
        }

        // 显示模拟估值
        function displayMockValuation() {
            performValuation('示例公司', {
                tech_breakthrough: '无直接影响',
                policy_relevance: '产业政策',
                supply_chain_impact: '产业链受益'
            });
        }

        // 选择公司
        function selectCompany(company) {
            console.log('选择公司:', company);
            if (currentValuation) {
                performValuation(company, currentValuation);
            }
        }
    </script>
</body>
</html>
